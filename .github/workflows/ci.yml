name: CI

on:
  push:
    branches: [main, "codex/**"]
  pull_request:

jobs:
  build-test-package:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build, test, and package
        run: mvn --batch-mode --update-snapshots verify
